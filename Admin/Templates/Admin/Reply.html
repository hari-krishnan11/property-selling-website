{% extends 'Admin/Header.html' %}
{% load static %}

{% block content %}

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }

    .reply-card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .form-control {
        border-radius: 8px;
    }

    .btn-submit {
        background-color: #0d6efd;
        border: none;
        border-radius: 8px;
        padding: 8px 25px;
    }

    .btn-submit:hover {
        background-color: #0b5ed7;
    }
</style>

<div class="container mt-5">

    <div class="card reply-card p-4 col-md-6 mx-auto">
        <h4 class="mb-4 text-center">Reply to Complaint</h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Reply</label>
                <textarea name="txt_reply"
                          class="form-control"
                          rows="6"
                          placeholder="Type your reply here..."
                          required></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-submit">
                    Submit Reply
                </button>
            </div>
        </form>

    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:usercomplaints' %}"
</script>
{% endif %}

{% endblock %}
